<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            background-color: #000;
        }
        h1 {
            font-size: 100px;
            margin: 0;
            text-shadow: 2px 2px #ff0000;
        }
        h2 {
            font-size: 30px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        p {
            font-size: 20px;
            line-height: 1.5;
        }
        .highlight {
            background-color: #00ff00;
            color: #000;
            padding: 2px 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>CONNECTION LOST</h2>
        <p>We searched the entire mainframe, but...</p>
        <p class="highlight">Ceci n'est pas une page</p>
    </div>
</body>
</html>
